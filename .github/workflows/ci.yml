name: Nexus Core CI & Security

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  code-quality-and-pentest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Yêu cầu bắt buộc để Strix quét được sự thay đổi của code (diff)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Strix
        run: curl -sSL https://strix.ai/install | bash

      - name: AI Security Pentest (Strix)
        env:
          STRIX_LLM: gemini/gemini-2.5-flash
          LLM_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: strix -n -t ./ --scan-mode quick --scope-mode diff --diff-base origin/main
